databases:
  - name: seedtracker-db
    plan: free
    databaseName: seedtracker

services:
  - type: web
    name: seedtracker
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: seedtracker-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: YANDEX_CLIENT_ID
        value: 5961c9d802294e53b0c204d9b3032150
      - key: YANDEX_CLIENT_SECRET
        value: 323c5c22ef974525b61ecd5e1053205f
      - key: YANDEX_REDIRECT_URI
        value: https://seedtracker.onrender.com/auth/yandex/callback
