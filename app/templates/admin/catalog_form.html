{% extends 'admin/base_admin.html' %}
{% block admin_content %}
<h2 class="mb-4">{% if entry %}✏️ Редактировать культуру{% else %}➕ Новая культура{% endif %}</h2>

<div class="card-nature" style="max-width:600px;">
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="row g-3">
            <div class="col-2">
                <label class="form-label">Эмодзи</label>
                <input name="emoji" class="form-control" value="{{ entry.emoji if entry else '🌱' }}" required>
            </div>
            <div class="col-10">
                <label class="form-label">Культура</label>
                <input name="crop_name" class="form-control" value="{{ entry.crop_name if entry else '' }}" required>
            </div>
            <div class="col-12">
                <label class="form-label">Сорт</label>
                <input name="variety" class="form-control" value="{{ entry.variety if entry else '' }}" required>
            </div>
            <div class="col-6">
                <label class="form-label">Интервал полива (дн.)</label>
                <input name="watering_interval_days" type="number" class="form-control" value="{{ entry.watering_interval_days if entry else 7 }}" required>
            </div>
            <div class="col-6">
                <label class="form-label">Дней до урожая</label>
                <input name="days_to_harvest" type="number" class="form-control" value="{{ entry.days_to_harvest if entry else 60 }}" required>
            </div>
            <div class="col-12">
                <label class="form-label">Описание</label>
                <textarea name="description" class="form-control" rows="2">{{ entry.description if entry else '' }}</textarea>
            </div>
        </div>
        <div class="mt-3 d-flex gap-2">
            <button type="submit" class="btn btn-nature">💾 Сохранить</button>
            <a href="{{ url_for('admin.catalog') }}" class="btn btn-outline-secondary">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
